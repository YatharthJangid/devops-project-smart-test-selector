global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'smart-test-selector'
    static_configs:
      - targets: ['smart-selector:8000']
  
  - job_name: 'demo-mode'
    static_configs:
      - targets: ['host.docker.internal:8000']
