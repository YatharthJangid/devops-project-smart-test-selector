global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # For local Docker Compose (smart-selector container)
  - job_name: 'smart-test-selector'
    static_configs:
      - targets: ['smart-selector:8000']

  # For local development (demo_mode.py running on host machine)
  - job_name: 'demo-mode-local'
    static_configs:
      - targets: ['host.docker.internal:8000']

  # For cloud deployment on Render.com (Internal Private Network)
  - job_name: 'render-cloud-internal'
    static_configs:
      - targets: ['smart-selector-demo:8000']
