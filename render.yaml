services:
  # Smart Selector Demo — continuously streams fake CI/CD metrics to Prometheus
  - type: web
    name: smart-selector-demo
    runtime: docker
    dockerfilePath: ./Dockerfile.demo
    plan: free
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: METRICS_PORT
        value: "8000"

  # Prometheus — monitoring UI pulling from the demo service
  - type: web
    name: prometheus-server
    runtime: image
    image:
      url: docker.io/prom/prometheus:latest
    plan: free
